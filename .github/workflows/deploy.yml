name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: nodejs-v24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./server

      - name: Build project
        run: npm run build
        working-directory: ./server

      - name: Package for deployment
        run: |
          tar -czf dist.tar.gz \
            -C server \
            dist \
            package.json \
            package-lock.json \
            prisma/schema.prisma \
            prisma/migrations

      - name: Install SSH tools
        run: |
          apt-get update
          apt-get install -y sshpass rsync

      - name: Deploy to server
        run: |
          DEPLOY_PATH="${{ secrets.SERVER_DEPLOY_PATH }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT || 22 }}"
          BACKUP_NAME=$(date +%Y%m%d_%H%M%S)

          # 创建部署目录并传输文件
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p $DEPLOY_PATH"
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" rsync -avz $SSH_OPTS dist.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$DEPLOY_PATH/

          # 在服务器上执行部署命令
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd $DEPLOY_PATH

            # 备份旧版本
            if [ -d dist ]; then
              tar -czf backups/backup_${BACKUP_NAME}.tar.gz dist/
              echo "Backup created: backup_${BACKUP_NAME}.tar.gz"
            fi

            # 停止旧服务
            pm2 stop server || true

            # 解压新的构建包
            tar -xzf dist.tar.gz

            # 安装生产依赖
            npm ci --production --legacy-peer-deps

            # 生成 Prisma Client
            npx prisma generate

            # 执行数据库迁移（如果有待执行的迁移）
            npx prisma migrate deploy || echo "No pending migrations"

            # 重启服务
            pm2 restart server || pm2 start dist/main.js --name server
            pm2 save
          ENDSSH

      - name: Verify deployment
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT || 22 }}"
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "pm2 status"
