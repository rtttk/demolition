version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: demolition-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-demolition2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demolition_mvp}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: demolition-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # app:
  #   build: .
  #   container_name: demolition-app
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #   depends_on:
  #     - mysql
  #     - redis

volumes:
  mysql_data:
  redis_data:
